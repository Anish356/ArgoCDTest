apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocdtest
  labels:
    app: argocdtest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocdtest
  template:
    metadata:
      labels:
        app: argocdtest
    spec:
      containers:
      - name: argocdtest-container
        image: anishyadav2132/argocdtest:v3
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5